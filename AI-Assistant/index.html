<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Area51 AI Assistant</title>
    <link rel="stylesheet" href="styles.css" />

    <header class="topbar">
      <img class="logo" src="pic/logo.png" alt="Area51 logo">
